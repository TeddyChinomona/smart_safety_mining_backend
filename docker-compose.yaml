services:

  # ── Infrastructure ───────────────────────────────────────────────────────────
  redis:
    image: redis:alpine
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - mining_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Django / Daphne ──────────────────────────────────────────────────────────
  web:
    build: .
    container_name: django_app
    ports:
      - "8000:8000"
    command: >
      sh -c "python manage.py migrate &&
             python setup_demo.py &&
             daphne -b 0.0.0.0 -p 8000 smart_safety_mining.asgi:application"
    environment:
      DJANGO_ADMIN_USERNAME: admin
      DJANGO_ADMIN_PASSWORD: admin123
      DJANGO_ADMIN_EMAIL: admin@mine.test
    volumes:
      - db_data:/data        # shared SQLite DB
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - mining_net
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8000/admin/login/"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # ── Celery worker ────────────────────────────────────────────────────────────
  celery:
    build: .
    container_name: celery_worker
    command: celery -A smart_safety_mining worker --loglevel=info
    volumes:
      - db_data:/data        # same shared SQLite DB — sees users/zones/sessions
    depends_on:
      redis:
        condition: service_healthy
      web:
        condition: service_healthy  # wait for migrate to complete before starting
    networks:
      - mining_net
    restart: unless-stopped

  # ── Celery beat (task scheduler) ─────────────────────────────────────────────
  celery-beat:
    build: .
    container_name: celery_beat
    command: celery -A smart_safety_mining beat --loglevel=info
    volumes:
      - db_data:/data        # shared SQLite DB
    depends_on:
      redis:
        condition: service_healthy
      celery:
        condition: service_started
    networks:
      - mining_net
    restart: unless-stopped

  # ── Simulator ────────────────────────────────────────────────────────────────
  simulator:
    build: .
    container_name: simulator
    command: python run_simulators.py
    environment:
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin123
      API_BASE: http://web:8000
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      ZONE_NAME: "Simba Shaft A"
      SESSION_NAME: "Morning Shift"
      GPS_SENSOR_IDS: "GPS-001 GPS-002 GPS-003"
      STARTUP_MAX: "90"
      GPS_WARMUP: "20"
    depends_on:
      web:
        condition: service_healthy
      celery:
        condition: service_started
      celery-beat:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - mining_net
    restart: on-failure

networks:
  mining_net:
    driver: bridge

volumes:
  db_data:    # named volume — persists the SQLite DB across container restarts